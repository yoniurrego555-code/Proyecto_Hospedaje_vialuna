<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer contrasena | ViaLuna</title>
  <link rel="stylesheet" href="/frontend/css/app.css">
</head>
<body>
  <main class="auth-layout">
    <section class="auth-card">
      <div class="auth-card__header">
        <span class="badge">Seguridad</span>
        <h2>Restablecer contrasena</h2>
        <p>Ingresa tu nueva clave para la cuenta administrativa.</p>
      </div>

      <form id="resetPasswordForm" class="auth-form">
        <div class="field-group">
          <label for="newPassword">Nueva contrasena</label>
          <input type="password" id="newPassword" minlength="6" placeholder="Minimo 6 caracteres" required>
        </div>

        <div class="field-group">
          <label for="confirmPassword">Confirmar contrasena</label>
          <input type="password" id="confirmPassword" minlength="6" placeholder="Repite la nueva contrasena" required>
        </div>

        <p id="resetPasswordFeedback" class="feedback" aria-live="polite"></p>

        <div class="form-actions">
          <button type="submit" class="btn-primary">Guardar nueva clave</button>
          <a class="btn-secondary" href="/frontend/public/login.html">Volver al login</a>
        </div>
      </form>
    </section>
  </main>

  <script type="module">
    import { resetPassword } from "/frontend/js/api.js";

    const LOGIN_URL = "/frontend/public/login.html";
    const form = document.getElementById("resetPasswordForm");
    const feedback = document.getElementById("resetPasswordFeedback");
    const newPasswordInput = document.getElementById("newPassword");
    const confirmPasswordInput = document.getElementById("confirmPassword");
    const token = new URLSearchParams(window.location.search).get("token") || "";

    if (form) {
      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        feedback.className = "feedback";
        feedback.textContent = "";

        const password = newPasswordInput.value.trim();
        const confirmPassword = confirmPasswordInput.value.trim();

        if (!token) {
          feedback.className = "feedback error";
          feedback.textContent = "El enlace de recuperacion es invalido.";
          return;
        }

        if (password.length < 6) {
          feedback.className = "feedback error";
          feedback.textContent = "La nueva clave debe tener al menos 6 caracteres.";
          return;
        }

        if (password !== confirmPassword) {
          feedback.className = "feedback error";
          feedback.textContent = "Las contrasenas no coinciden.";
          return;
        }

        try {
          const response = await resetPassword({ token, password });
          feedback.className = "feedback success";
          feedback.textContent = response?.mensaje || "La clave fue actualizada correctamente.";

          window.setTimeout(() => {
            window.location.href = LOGIN_URL;
          }, 1800);
        } catch (error) {
          console.error("Error restableciendo clave:", error);
          feedback.className = "feedback error";
          feedback.textContent = error.message;
        }
      });
    }
  </script>
</body>
</html>
