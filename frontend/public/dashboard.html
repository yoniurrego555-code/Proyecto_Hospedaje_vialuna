<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Hospedaje</title>

<style>

body{
margin:0;
font-family: Arial, sans-serif;
display:flex;
background:#f4f6f9;
}

/* SIDEBAR */
.sidebar{
width:220px;
background:#0d47a1;
color:white;
height:100vh;
padding:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar ul{
list-style:none;
padding:0;
}

.sidebar li{
padding:12px;
cursor:pointer;
border-radius:5px;
}

.sidebar li:hover{
background:#1565c0;
}

/* CONTENIDO */
.main{
flex:1;
padding:20px;
}

h1{
margin-bottom:20px;
}

/* TABLAS */
table{
width:100%;
background:white;
border-collapse:collapse;
margin-top:20px;
border-radius:10px;
overflow:hidden;
}

th{
background:#0d47a1;
color:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

/* BOTONES */
button{
padding:8px 12px;
background:#0d47a1;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1565c0;
}

input{
padding:8px;
width:200px;
margin:5px;
}

</style>
</head>

<body>

<!-- MENU -->
<div class="sidebar">
<h2>🏨 Hospedaje</h2>

<ul>
<li onclick="cargarReservas()">📅 Reservas</li>
<li onclick="cargarRoles()">👤 Roles</li>
<li onclick="cargarServicios()">🛎 Servicios</li>
</ul>

</div>

<!-- CONTENIDO -->
<div class="main">

<h1>Dashboard</h1>

<div id="contenido"></div>

</div>

<script>

const API = "http://localhost:3000/api";

// ======================
// RESERVAS
// ======================
async function cargarReservas(){

const res = await fetch(`${API}/reservas`);
const data = await res.json();

let html = `
<h2>Reservas</h2>

<button onclick="mostrarFormulario()">➕ Nueva Reserva</button>

<table>
<tr>
<th>ID</th>
<th>Cliente</th>
<th>Inicio</th>
<th>Fin</th>
<th>Acciones</th>
</tr>
`;

data.forEach(r => {
html += `
<tr>
<td>${r.id_reserva}</td>
<td>${r.id_cliente}</td>
<td>${r.fecha_inicio}</td>
<td>${r.fecha_fin}</td>
<td>
<button onclick="eliminarReserva(${r.id_reserva})">Eliminar</button>
</td>
</tr>
`;
});

html += "</table>";

document.getElementById("contenido").innerHTML = html;

}

// ======================
// FORMULARIO
// ======================
function mostrarFormulario(){

document.getElementById("contenido").innerHTML = `
<h2>Nueva Reserva</h2>

<input id="id_cliente" placeholder="ID Cliente"><br>
<input id="fecha_inicio" type="date"><br>
<input id="fecha_fin" type="date"><br>

<button onclick="crearReserva()">Guardar</button>
<button onclick="cargarReservas()">Volver</button>
`;

}

// ======================
// CREAR
// ======================
async function crearReserva(){

const id_cliente = document.getElementById("id_cliente").value;
const fecha_inicio = document.getElementById("fecha_inicio").value;
const fecha_fin = document.getElementById("fecha_fin").value;

await fetch(`${API}/reservas`,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({ id_cliente, fecha_inicio, fecha_fin })
});

alert("Reserva creada");
cargarReservas();

}

// ======================
// ELIMINAR
// ======================
async function eliminarReserva(id){

if(!confirm("¿Eliminar reserva?")) return;

await fetch(`${API}/reservas/${id}`,{
method:"DELETE"
});

cargarReservas();

}

// ======================
// ROLES
// ======================
async function cargarRoles(){

const res = await fetch(`${API}/roles`);
const data = await res.json();

let html = `
<h2>Roles</h2>
<table>
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Descripción</th>
<th>Estado</th>
</tr>
`;

data.forEach(r => {
html += `
<tr>
<td>${r.IDRol}</td>
<td>${r.Nombre}</td>
<td>${r.Descripcion}</td>
<td>${r.Estado}</td>
</tr>
`;
});

html += "</table>";

document.getElementById("contenido").innerHTML = html;

}

// ======================
// SERVICIOS
// ======================
async function cargarServicios(){

const res = await fetch(`${API}/detalleservicios`);
const data = await res.json();

let html = `
<h2>Servicios</h2>
<table>
<tr>
<th>ID</th>
<th>Reserva</th>
<th>Servicio</th>
<th>Cantidad</th>
<th>Precio</th>
</tr>
`;

data.forEach(s => {
html += `
<tr>
<td>${s.IDDetalleReservaServicio}</td>
<td>${s.IDReserva}</td>
<td>${s.NombreServicio}</td>
<td>${s.Cantidad}</td>
<td>${s.Precio}</td>
</tr>
`;
});

html += "</table>";

document.getElementById("contenido").innerHTML = html;

}

// ======================
// INICIO AUTOMATICO
// ======================
cargarReservas();

</script>

</body>
</html>
