<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body class="login-body">

  <div class="login-container">
    <h2>Iniciar Sesión 🏨</h2>

    <form id="loginForm">

      <input 
        type="email" 
        id="email" 
        placeholder="Correo" 
        required
      >

      <!-- (Opcional por ahora, no validamos password aún) -->
      <input 
        type="password" 
        id="password" 
        placeholder="Contraseña"
      >

      <button type="submit">Ingresar</button>

      <!-- Botón registro -->
      <button type="button" onclick="irRegistro()" class="secondary-btn">
        Registrarse
      </button>

    </form>
  </div>

  <script type="module" src="../js/auth.js"></script>

</body>
</html>
