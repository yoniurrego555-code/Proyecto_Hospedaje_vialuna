<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reserva</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body class="reserva-body">

  <div class="container">

    <!-- 🔷 TÍTULO -->
    <h1>Sistema de Reservas de Habitaciones</h1>
    <p class="subtitulo">Gestiona tus reservas fácilmente</p>

    <!-- 🧾 FORMULARIO -->
    <div class="card-form">

      <h2>Reservar Habitación 🏨</h2>

      <form id="reservaForm">

        <div class="grid">

          <!-- Documento -->
          <div>
            <label>Número de documento</label>
            <input type="text" id="documento" required>
          </div>

          <!-- Habitación -->
          <div>
            <label>Habitación seleccionada</label>
            <input type="text" id="habitacionSeleccionada" readonly placeholder="Selecciona una habitación">
            <input type="hidden" id="idHabitacion">
            <p id="descripcionHabitacion" style="color: gray;"></p>
            <input type="hidden" id="costoHabitacion">
          </div>

          <!-- Fecha inicio -->
          <div>
            <label>Fecha inicio</label>
            <input type="date" id="fechaInicio" required>
          </div>

          <!-- Fecha fin -->
          <div>
            <label>Fecha fin</label>
            <input type="date" id="fechaFin" required>
          </div>

          <!-- Método de pago -->
          <div>
            <label>Método de pago</label>
            <select id="metodoPago" required>
              <option value="">Seleccione</option>
              <option value="1">Efectivo</option>
              <option value="2">Tarjeta</option>
              <option value="3">Transferencia</option>
            </select>
          </div>

          <!-- Paquetes -->
          <div>
            <label>Paquete</label>
            <select id="paquetes">
              <option value="">Sin paquete</option>
            </select>
            <p id="descripcionPaquete" style="color: gray;"></p>
          </div>

        </div>

        <!-- 🏨 HABITACIONES -->
        <h3>Habitaciones</h3>
        <div id="listaHabitaciones" class="grid-cards"></div>

        <!-- 🛎️ SERVICIOS -->
        <h3>Servicios adicionales</h3>
        <div id="serviciosContainer" class="servicios-grid"></div>

        <hr>

        <!-- 💰 RESUMEN -->
        <h3>💰 Resumen</h3>
        <p>Subtotal: $<span id="subtotal">0</span></p>
        <p>Total: $<span id="total">0</span></p>

        <!-- BOTÓN -->
        <button type="submit" class="btn">Confirmar Reserva</button>

      </form>

    </div>

    <!-- 📋 LISTA DE RESERVAS -->
    <div class="card-form" style="margin-top: 20px;">
      <h3>📋 Lista de Reservas</h3>

      <!-- 🔥 FILTROS -->
      <div style="margin-bottom: 10px;">
        <button type="button" onclick="filtrarReservas('todas')">Todas</button>
        <button type="button" onclick="filtrarReservas('activas')">Activas</button>
        <button type="button" onclick="filtrarReservas('canceladas')">Canceladas</button>
      </div>

      <div id="listaReservas"></div>
    </div>

  </div>

  <!-- 🔥 IMPORTANTE: SIN type="module" -->
  <script src="../js/reservas.js"></script>

</body>
</html>
