<section class="hero">
  <div>
    <h2>Gestión de Clientes</h2>
    <p>Administra el registro completo de clientes del sistema</p>
  </div>
  <div class="badge">Clientes</div>
</section>

<section class="grid">
  <article class="panel">
    <div class="panel-header">
      <h3>Lista de Clientes</h3>
      <p>Visualiza y gestiona todos los clientes registrados</p>
    </div>

    <div class="toolbar">
      <input class="search" type="search" id="buscador" placeholder="Buscar por nombre, email o ID">
      <button class="primary" type="button" id="btnNuevoCliente" onclick="toggleFormularioCliente()">+ Nuevo Cliente</button>
    </div>

    <!-- Formulario dinámico para crear cliente -->
    <div id="formClienteContainer" class="form-oculto">
      <form id="formCliente">
        <input type="hidden" id="clienteIdAnterior">
        <div class="form-group">
          <label for="nombreCliente">Nombre:</label>
          <input type="text" id="nombreCliente" name="nombre" required>
        </div>
        <div class="form-group">
          <label for="apellidoCliente">Apellido:</label>
          <input type="text" id="apellidoCliente" name="apellido">
        </div>
        <div class="form-group">
          <label for="documentoCliente">Documento:</label>
          <input type="text" id="documentoCliente" name="documento" required>
        </div>
        <div class="form-group">
          <label for="correoCliente">Correo:</label>
          <input type="email" id="correoCliente" name="correo" required>
        </div>
        <div class="form-group">
          <label for="direccionCliente">Dirección:</label>
          <input type="text" id="direccionCliente" name="direccion" required>
        </div>
        <div class="form-group">
          <label for="telefonoCliente">Teléfono:</label>
          <input type="tel" id="telefonoCliente" name="telefono">
        </div>
        <div class="form-actions">
          <button class="primary" type="button" onclick="guardarCliente()">Guardar Cliente</button>
          <button class="secondary" type="button" onclick="toggleFormularioCliente()">Cancelar</button>
        </div>
      </form>
    </div>

    <div id="clientesContainer" class="cards">
      <!-- Clientes se cargarán dinámicamente -->
    </div>
  </article>

  <article class="panel">
    <div class="panel-header">
      <h3>Estadísticas de Clientes</h3>
      <p>Información general sobre los clientes</p>
    </div>

    <div class="stats-grid">
      <div class="stat-item">
        <span>Total Clientes</span>
        <strong id="totalClientes">0</strong>
      </div>
      <div class="stat-item">
        <span>Activos</span>
        <strong id="clientesActivos">0</strong>
      </div>
      <div class="stat-item">
        <span>Nuevos este mes</span>
        <strong id="clientesNuevos">0</strong>
      </div>
      <div class="stat-item">
        <span>Con reservas</span>
        <strong id="clientesConReservas">0</strong>
      </div>
    </div>
  </article>
</section>

<style>
.form-oculto {
  display: none;
}

.form-visible {
  display: block;
  background: #f8f9fa;
  padding: 20px;
  border-radius: 8px;
  margin: 20px 0;
  border: 1px solid #dee2e6;
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  margin-bottom: 8px;
  font-weight: 500;
  color: #495057;
}

.form-group input {
  width: 100%;
  padding: 10px;
  border: 1px solid #ced4da;
  border-radius: 4px;
  font-size: 14px;
}

.form-group input:focus {
  outline: none;
  border-color: #007bff;
  box-shadow: 0 0 0 2px rgba(0,123,255,0.25);
}

.form-actions {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}

.empty {
  text-align: center;
  padding: 40px;
  color: #6c757d;
  font-style: italic;
}

.success {
  background: #d4edda;
  border: 1px solid #c3e6cb;
  border-radius: 8px;
  padding: 20px;
  text-align: center;
  color: #155724;
  margin: 20px 0;
}

.error {
  background: #f8d7da;
  border: 1px solid #f5c6cb;
  border-radius: 8px;
  padding: 20px;
  text-align: center;
  color: #721c24;
  margin: 20px 0;
}
</style>

<script>
// API REST CONEXIÓN Y CRUD DE CLIENTES
class ClientesAPI {
  constructor() {
    this.baseURL = 'http://localhost:3000/api';
    // No auto-inicializar en constructor
  }

  inicializar() {
    console.log('Inicializando módulo de clientes con API...');
    setTimeout(() => {
      this.cargarClientes();
      this.configurarEventos();
    }, 500);
  }

  // Obtener todos los clientes
  async cargarClientes() {
    try {
      const container = document.getElementById('clientesContainer');
      if (!container) {
        console.error('Elemento clientesContainer no encontrado');
        return;
      }
      container.innerHTML = '<div class="loading">Cargando clientes...</div>';

      const response = await fetch(`${this.baseURL}/clientes`);
      if (!response.ok) {
        throw new Error(`Error ${response.status}: No se pudieron cargar los clientes`);
      }
      
      const clientes = await response.json();
      this.renderClientes(clientes);
      this.updateEstadisticas(clientes);
      
    } catch (error) {
      console.error('Error al cargar clientes:', error);
      this.mostrarMensaje('Error de conexión: No se pudo cargar la información de la base de datos', 'error');
      
      const container = document.getElementById('clientesContainer');
      if (container) {
        container.innerHTML = '<div class="error">Error al conectar con la base de datos. Por favor, verifica que el servidor esté encendido.</div>';
      }
    }
  }

  // Crear o editar cliente
  async guardarCliente(datos) {
    try {
      const idAnterior = document.getElementById('clienteIdAnterior').value;
      const method = idAnterior ? 'PUT' : 'POST';
      const url = idAnterior ? `${this.baseURL}/clientes/${idAnterior}` : `${this.baseURL}/clientes`;
      
      const response = await fetch(url, {
        method: method,
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(datos)
      });

      if (!response.ok) {
        throw new Error(`Error ${response.status}: No se pudo ${idAnterior ? 'actualizar' : 'crear'} el cliente`);
      }

      const clienteCreado = await response.json();
      this.mostrarMensaje(`Cliente ${idAnterior ? 'actualizado' : 'creado'} exitosamente`, 'success');
      this.cargarClientes(); // Recargar lista
      
      const formulario = document.getElementById('formClienteContainer');
      formulario.classList.add('form-oculto');
      formulario.classList.remove('form-visible');
      document.getElementById('formCliente').reset();
      document.getElementById('clienteIdAnterior').value = '';
      document.getElementById('documentoCliente').readOnly = false;
      
      return clienteCreado;
      
    } catch (error) {
      console.error('Error al guardar cliente:', error);
      this.mostrarMensaje('Error al guardar cliente: ' + error.message, 'error');
      throw error;
    }
  }

  // Eliminar cliente
  async eliminarCliente(id) {
    try {
      const response = await fetch(`${this.baseURL}/clientes/${id}`, { method: 'DELETE' });
      if (!response.ok) throw new Error(`Error ${response.status}`);
      this.mostrarMensaje('Cliente eliminado exitosamente', 'success');
      this.cargarClientes();
    } catch (error) {
      this.mostrarMensaje('Error al eliminar cliente: ' + error.message, 'error');
    }
  }

  // Obtener cliente
  async obtenerCliente(id) {
    try {
      const response = await fetch(`${this.baseURL}/clientes/${id}`);
      if (!response.ok) throw new Error('Cliente no encontrado');
      return await response.json();
    } catch (error) {
      this.mostrarMensaje('Error al obtener cliente: ' + error.message, 'error');
      return null;
    }
  }

  // Renderizar clientes
  renderClientes(clientes) {
    const container = document.getElementById('clientesContainer');
    if (!container) {
      console.error('Elemento clientesContainer no encontrado en renderClientes');
      return;
    }
    
    if (clientes.length === 0) {
      container.innerHTML = '<div class="empty">No hay clientes registrados</div>';
      return;
    }

    container.innerHTML = clientes.map(cliente => `
      <div class="card">
        <div class="card-header">
          <h4>${cliente.Nombre || cliente.nombre || 'Cliente'} ${cliente.Apellido || ''}</h4>
          <span class="status-badge status-activo">Activo</span>
        </div>
        <div class="card-content">
          <p><strong>Documento:</strong> ${cliente.NroDocumento || cliente.documento || 'N/A'}</p>
          <p><strong>Correo:</strong> ${cliente.Email || cliente.correo || 'N/A'}</p>
          <p><strong>Teléfono:</strong> ${cliente.Telefono || 'N/A'}</p>
        </div>
        <div class="card-buttons">
          <button class="secondary" onclick="editarCliente('${cliente.NroDocumento}')">Editar</button>
          <button class="ghost" onclick="eliminarCliente('${cliente.NroDocumento}')">Eliminar</button>
          <button class="ghost" onclick="verCliente('${cliente.NroDocumento}')">Ver Detalle</button>
        </div>
      </div>
    `).join('');
  }

  // Actualizar estadísticas
  updateEstadisticas(clientes) {
    const stats = {
      total: clientes.length,
      activos: clientes.filter(c => c.estado === 'activo' || !c.estado).length,
      nuevosMes: 0,
      conReservas: 0
    };
    
    document.getElementById('totalClientes').textContent = stats.total;
    document.getElementById('clientesActivos').textContent = stats.activos;
    document.getElementById('clientesNuevos').textContent = stats.nuevosMes;
    document.getElementById('clientesConReservas').textContent = stats.conReservas;
  }

  // Datos de ejemplo
  getClientesEjemplo() {
    return [
      {
        id: 1,
        nombre: 'Juan Pérez',
        documento: '123456789',
        correo: 'juan.perez@email.com',
        estado: 'activo'
      },
      {
        id: 2,
        nombre: 'María García',
        documento: '987654321',
        correo: 'maria.garcia@email.com',
        estado: 'activo'
      }
    ];
  }

  // Mostrar mensaje
  mostrarMensaje(mensaje, tipo) {
    const mensajeDiv = document.createElement('div');
    mensajeDiv.className = tipo;
    mensajeDiv.textContent = mensaje;
    
    const panel = document.querySelector('.panel');
    if (panel) {
      panel.parentNode.insertBefore(mensajeDiv, panel);
    }
    
    setTimeout(() => {
      mensajeDiv.remove();
    }, 3000);
  }

  // Configurar eventos
  configurarEventos() {
    // Búsqueda
    document.getElementById('buscador')?.addEventListener('input', (e) => {
      const termino = e.target.value.toLowerCase();
      const clientes = document.querySelectorAll('.card');
      
      clientes.forEach(card => {
        const texto = card.textContent.toLowerCase();
        card.style.display = texto.includes(termino) ? '' : 'none';
      });
    });
  }
}

// FUNCIONES GLOBALES

// Toggle formulario cliente
function toggleFormularioCliente() {
  const formulario = document.getElementById('formClienteContainer');
  formulario.classList.toggle('form-oculto');
  formulario.classList.toggle('form-visible');
  if (formulario.classList.contains('form-oculto')) {
    document.getElementById('formCliente').reset();
    document.getElementById('clienteIdAnterior').value = '';
    document.getElementById('documentoCliente').readOnly = false;
  }
}

// Guardar cliente
function guardarCliente() {
  const form = document.getElementById('formCliente');
  if (!form.checkValidity()) {
    form.reportValidity();
    return;
  }
  const formData = new FormData(form);
  const datos = {
    NroDocumento: formData.get('documento'),
    Nombre: formData.get('nombre'),
    Apellido: formData.get('apellido') || '',
    Direccion: formData.get('direccion') || 'Sin dirección',
    Email: formData.get('correo'),
    Telefono: formData.get('telefono') || '',
    Estado: 1,
    IDRol: 2
  };
  
  if (clientesApi) {
    clientesApi.guardarCliente(datos);
  }
}

// Global functions for CRUD
async function editarCliente(id) {
  if (clientesApi) {
    const cliente = await clientesApi.obtenerCliente(id);
    if (cliente) {
      document.getElementById('clienteIdAnterior').value = cliente.NroDocumento;
      document.getElementById('documentoCliente').value = cliente.NroDocumento;
      document.getElementById('nombreCliente').value = cliente.Nombre;
      document.getElementById('apellidoCliente').value = cliente.Apellido;
      document.getElementById('direccionCliente').value = cliente.Direccion;
      document.getElementById('correoCliente').value = cliente.Email;
      document.getElementById('telefonoCliente').value = cliente.Telefono;
      
      const formulario = document.getElementById('formClienteContainer');
      formulario.classList.remove('form-oculto');
      formulario.classList.add('form-visible');
      window.scrollTo(0, 0);
    }
  }
}

function eliminarCliente(id) {
  if (confirm('¿Está seguro de eliminar este cliente?')) {
    if (clientesApi) {
      clientesApi.eliminarCliente(id);
    }
  }
}

async function verCliente(id) {
  if (clientesApi) {
    const cliente = await clientesApi.obtenerCliente(id);
    if (cliente) {
      alert(`Detalles del Cliente:\nDocumento: ${cliente.NroDocumento}\nNombre: ${cliente.Nombre} ${cliente.Apellido}\nCorreo: ${cliente.Email}\nTeléfono: ${cliente.Telefono}\nDirección: ${cliente.Direccion}`);
    }
  }
}

// Inicializar módulo cuando se carga
let clientesApi;

// Función de inicialización para el dashboard
function inicializarClientesAPI() {
  if (!clientesApi) {
    clientesApi = new ClientesAPI();
    clientesApi.inicializar();
} else {
    clientesApi.inicializar();
  }
}

// Hacer accesible globalmente
window.clientesApi = clientesApi;
window.inicializarClientesAPI = inicializarClientesAPI;
window.toggleFormularioCliente = toggleFormularioCliente;
window.guardarCliente = guardarCliente;
window.editarCliente = editarCliente;
window.eliminarCliente = eliminarCliente;
window.verCliente = verCliente;
</script>
