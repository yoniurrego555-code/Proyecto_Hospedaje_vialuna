<section class="hero">
  <div>
    <h2>Módulo de Usuarios</h2>
    <p>Crea, consulta, edita y elimina usuarios del sistema</p>
  </div>
  <div class="badge">CRUD conectado</div>
</section>

<section class="grid">
  <article class="panel">
    <div class="panel-header">
      <h3>Formulario</h3>
      <p id="formTitle">Registra un nuevo usuario</p>
    </div>

    <div id="mensaje" class="message"></div>

    <form id="usuarioForm">
      <input type="hidden" id="usuarioId">

      <div class="field">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" placeholder="Ej. Maria Gomez" required>
      </div>

      <div class="field">
        <label for="email">Correo</label>
        <input type="email" id="email" name="email" placeholder="correo@vialuna.com" required>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres">
        <span class="helper">Deja este campo vacío al editar si no deseas cambiar la contraseña.</span>
      </div>

      <div class="field">
        <label for="rol">Rol</label>
        <select id="rol" name="rol" required>
          <option value="usuario">Usuario</option>
          <option value="admin">Administrador</option>
        </select>
      </div>

      <div class="actions">
        <button class="primary" type="submit" id="submitButton">Guardar usuario</button>
        <button class="secondary" type="button" id="btnCancelarEdicion">Cancelar</button>
      </div>
    </form>
  </article>

  <article class="panel">
    <div class="toolbar">
      <input class="search" type="search" id="buscador" placeholder="Buscar por nombre, correo o rol">
      <button class="secondary" type="button" id="btnListar">Listar usuarios</button>
    </div>

    <div id="usuariosContainer" class="cards">
      <div class="empty">Cargando usuarios...</div>
    </div>
  </article>
</section>

<script>
// API REST CONEXIÓN PARA USUARIOS
class UsuariosAPI {
  constructor() {
    this.baseURL = 'http://localhost:3000/api';
    // No auto-inicializar en constructor
  }

  inicializar() {
    console.log('Inicializando módulo de usuarios con API...');
    setTimeout(() => {
      this.cargarUsuarios();
      this.configurarEventos();
    }, 500);
  }

  async cargarUsuarios() {
    try {
      const container = document.getElementById('usuariosContainer');
      if (!container) {
        console.error('Elemento usuariosContainer no encontrado');
        return;
      }
      container.innerHTML = '<div class="loading">Cargando usuarios...</div>';

      const response = await fetch(`${this.baseURL}/usuarios`);
      if (!response.ok) {
        throw new Error(`Error ${response.status}: No se pudieron cargar los usuarios`);
      }
      
      const usuarios = await response.json();
      this.renderUsuarios(usuarios);
      
    } catch (error) {
      console.error('Error al cargar usuarios:', error);
      this.mostrarMensaje('Error al cargar usuarios: ' + error.message, 'error');
      this.renderUsuarios(this.getDatosEjemplo());
    }
  }

  renderUsuarios(usuarios) {
    const container = document.getElementById('usuariosContainer');
    if (!container) {
      console.error('Elemento usuariosContainer no encontrado en renderUsuarios');
      return;
    }
    
    if (usuarios.length === 0) {
      container.innerHTML = '<div class="empty">No hay usuarios configurados</div>';
      return;
    }

    container.innerHTML = usuarios.map(usr => `
      <div class="card">
        <h4>${usr.Nombre || usr.nombre}</h4>
        <p>${usr.Email || usr.email}</p>
        <div class="card-actions">
          <span class="role ${usr.NombreRol === 'Administrador' || usr.rol === 'admin' ? 'admin' : 'user'}">
            ${usr.NombreRol || usr.rol}
          </span>
        </div>
        <div class="card-buttons">
          <button class="secondary" onclick="editarUsuario(${usr.IDUsuario || usr.id})">Editar</button>
          <button class="ghost" onclick="eliminarUsuario(${usr.IDUsuario || usr.id})">Eliminar</button>
        </div>
      </div>
    `).join('');
  }

  getDatosEjemplo() {
    return [
      {
        IDUsuario: 1,
        NombreUsuario: 'Administrador',
        Correo: 'admin@vialuna.com',
        Rol: 'admin'
      },
      {
        IDUsuario: 2,
        NombreUsuario: 'Juan Pérez',
        Correo: 'juan@vialuna.com',
        Rol: 'usuario'
      }
    ];
  }

  mostrarMensaje(mensaje, tipo) {
    const mensajeDiv = document.getElementById('mensaje');
    if (mensajeDiv) {
      mensajeDiv.className = tipo;
      mensajeDiv.textContent = mensaje;
      setTimeout(() => {
        mensajeDiv.textContent = '';
        mensajeDiv.className = '';
      }, 3000);
    }
  }

  configurarEventos() {
    const form = document.getElementById('usuarioForm');
    if (form) {
      form.addEventListener('submit', (e) => this.guardarUsuario(e));
    }
  }

  async guardarUsuario(e) {
    e.preventDefault();
    const id = document.getElementById('usuarioId').value;
    const datos = {
      Nombre: document.getElementById('nombre').value,
      Email: document.getElementById('email').value,
      IDRol: document.getElementById('rol').value === 'admin' ? 1 : 2
    };

    const password = document.getElementById('password').value;
    if (password) {
      datos.Password = password;
    }

    try {
      const url = id ? `${this.baseURL}/usuarios/${id}` : `${this.baseURL}/usuarios`;
      const method = id ? 'PUT' : 'POST';
      
      const response = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(datos)
      });

      if (!response.ok) throw new Error('Error al guardar usuario');

      this.mostrarMensaje(id ? 'Usuario actualizado' : 'Usuario creado', 'success');
      document.getElementById('usuarioForm').reset();
      document.getElementById('usuarioId').value = '';
      this.cargarUsuarios();
    } catch (error) {
      console.error('Error al guardar usuario:', error);
      this.mostrarMensaje('Error al guardar: ' + error.message, 'error');
    }
  }
}

// Funciones globales
function editarUsuario(id) {
  console.log('Editar usuario:', id);
}

function eliminarUsuario(id) {
  console.log('Eliminar usuario:', id);
}

// Función de inicialización
function inicializarUsuariosAPI() {
  if (!window.usuariosApi) {
    window.usuariosApi = new UsuariosAPI();
  }
}

window.inicializarUsuariosAPI = inicializarUsuariosAPI;
window.editarUsuario = editarUsuario;
window.eliminarUsuario = eliminarUsuario;
</script>
