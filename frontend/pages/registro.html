<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro | ViaLuna</title>
  <link rel="stylesheet" href="../styles/login.css">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-panel auth-panel--wide">
      <div class="auth-brand">
        <span class="auth-chip">Registro de clientes</span>
        <h1>Crear cuenta</h1>
        <p>Completa tus datos para reservar y acceder al portal de cliente.</p>
      </div>

      <form id="registroForm" class="auth-form">
        <div class="auth-grid">
          <div class="auth-field">
            <label for="nombre">Nombre</label>
            <div class="auth-input">
              <span class="auth-icon">N</span>
              <input type="text" id="nombre" required>
            </div>
          </div>

          <div class="auth-field">
            <label for="apellido">Apellido</label>
            <div class="auth-input">
              <span class="auth-icon">A</span>
              <input type="text" id="apellido" required>
            </div>
          </div>

          <div class="auth-field">
            <label for="documento">Documento</label>
            <div class="auth-input">
              <span class="auth-icon">#</span>
              <input type="text" id="documento" required>
            </div>
          </div>

          <div class="auth-field">
            <label for="telefono">Teléfono</label>
            <div class="auth-input">
              <span class="auth-icon">T</span>
              <input type="tel" id="telefono" required>
            </div>
          </div>

          <div class="auth-field auth-field--full">
            <label for="direccion">Dirección</label>
            <div class="auth-input">
              <span class="auth-icon">D</span>
              <input type="text" id="direccion">
            </div>
          </div>

          <div class="auth-field">
            <label for="email">Correo electrónico</label>
            <div class="auth-input">
              <span class="auth-icon">@</span>
              <input type="email" id="email" autocomplete="email" required>
            </div>
          </div>

          <div class="auth-field">
            <label for="password">Contraseña</label>
            <div class="auth-input">
              <span class="auth-icon">*</span>
              <input type="password" id="password" minlength="6" autocomplete="new-password" required>
              <button type="button" id="toggleRegisterPassword">Mostrar</button>
            </div>
          </div>
        </div>

        <p id="registroFeedback" class="feedback" aria-live="polite"></p>

        <div class="auth-actions">
          <button type="submit" class="btn btn-primary">Registrarse</button>
          <a class="btn btn-secondary" href="../public/login.html">Volver al login</a>
        </div>
      </form>
    </section>
  </main>

  <script type="module" src="../dashboard/core/auth.js"></script>
</body>
</html>
