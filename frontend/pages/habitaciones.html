<section class="hero">
  <div>
    <h2>Módulo de Habitaciones</h2>
    <p>Crea, consulta, edita y elimina habitaciones</p>
  </div>
  <div class="badge">CRUD conectado</div>
</section>

<section class="grid">
  <article class="panel">
    <div class="panel-header">
      <h3>Formulario</h3>
      <p id="formTitle">Registra una nueva habitación</p>
    </div>

    <div id="mensaje" class="message"></div>

    <form id="habitacionForm">
      <input type="hidden" id="habitacionId">

      <div class="field">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" placeholder="Ej. Suite Luna 101" required>
      </div>

      <div class="field">
        <label for="descripcion">Descripción</label>
        <textarea id="descripcion" name="descripcion" placeholder="Describe amenidades, vista, cama, etc."></textarea>
      </div>

      <div class="field-grid">
        <div class="field">
          <label for="precio">Precio por noche</label>
          <input type="number" id="precio" name="precio" min="1" step="0.01" placeholder="1200" required>
        </div>
        <div class="field">
          <label for="capacidad">Capacidad</label>
          <input type="number" id="capacidad" name="capacidad" min="1" step="1" placeholder="2" required>
        </div>
      </div>

      <div class="field">
        <label for="estado">Estado</label>
        <select id="estado" name="estado" required>
          <option value="disponible">Disponible</option>
          <option value="reservada">Reservada</option>
          <option value="ocupada">Ocupada</option>
          <option value="mantenimiento">Mantenimiento</option>
        </select>
      </div>

      <div class="actions">
        <button class="primary" type="submit" id="submitButton">Guardar habitación</button>
        <button class="secondary" type="button" id="btnCancelarEdicion">Cancelar</button>
      </div>
    </form>
  </article>

  <article class="panel">
    <div class="toolbar">
      <input class="search" type="search" id="buscador" placeholder="Buscar por nombre, descripción o estado">
      <button class="secondary" type="button" id="btnListar">Listar habitaciones</button>
    </div>

    <div id="habitacionesContainer" class="cards">
      <div class="empty">Cargando habitaciones...</div>
    </div>
  </article>
</section>

<script>
// API REST CONEXIÓN PARA HABITACIONES
class HabitacionesAPI {
  constructor() {
    this.baseURL = 'http://localhost:3000/api';
    // No auto-inicializar en constructor
  }

  inicializar() {
    console.log('Inicializando módulo de habitaciones con API...');
    setTimeout(() => {
      this.cargarHabitaciones();
      this.configurarEventos();
    }, 500);
  }

  async cargarHabitaciones() {
    try {
      const container = document.getElementById('habitacionesContainer');
      if (!container) {
        console.error('Elemento habitacionesContainer no encontrado');
        return;
      }
      container.innerHTML = '<div class="loading">Cargando habitaciones...</div>';

      const response = await fetch(`${this.baseURL}/habitacion`);
      if (!response.ok) {
        throw new Error(`Error ${response.status}: No se pudieron cargar las habitaciones`);
      }
      
      const habitaciones = await response.json();
      this.renderHabitaciones(habitaciones);
      
    } catch (error) {
      console.error('Error al cargar habitaciones:', error);
      this.mostrarMensaje('Error al cargar habitaciones: ' + error.message, 'error');

    }
  }

  renderHabitaciones(habitaciones) {
    const container = document.getElementById('habitacionesContainer');
    if (!container) {
      console.error('Elemento habitacionesContainer no encontrado en renderHabitaciones');
      return;
    }
    
    if (habitaciones.length === 0) {
      container.innerHTML = '<div class="empty">No hay habitaciones configuradas</div>';
      return;
    }

    container.innerHTML = habitaciones.map(hab => `
      <div class="card">
        <h4>${hab.NombreHabitacion || hab.nombre}</h4>
        <p>${hab.Descripcion || hab.descripcion || 'Sin descripción'}</p>
        <div class="card-actions">
          <span class="price">$${hab.Costo || hab.costo || 0}</span>
          <span class="capacity">${hab.CapacidadMaximaPersonas || hab.capacidad} pers.</span>
          <span class="status ${hab.Estado === 1 || hab.estado === 'disponible' ? 'active' : 'inactive'}">
            ${hab.Estado === 1 || hab.estado === 'disponible' ? 'Disponible' : 'No disponible'}
          </span>
        </div>
        <div class="card-buttons">
          <button class="secondary" onclick="editarHabitacion(${hab.IDHabitacion || hab.id})">Editar</button>
          <button class="ghost" onclick="eliminarHabitacion(${hab.IDHabitacion || hab.id})">Eliminar</button>
        </div>
      </div>
    `).join('');
  }

  getDatosEjemplo() {
    return [
      {
        IDHabitacion: 1,
        NombreHabitacion: 'Suite Ejecutiva',
        Descripcion: 'Habitación de lujo con vista panorámica',
        Costo: 200000,
        CapacidadMaximaPersonas: 3,
        Estado: 1
      },
      {
        IDHabitacion: 2,
        NombreHabitacion: 'Doble Confort',
        Descripcion: 'Para 2 personas con amenities premium',
        Costo: 120000,
        CapacidadMaximaPersonas: 2,
        Estado: 1
      }
    ];
  }

  mostrarMensaje(mensaje, tipo) {
    const mensajeDiv = document.getElementById('mensaje');
    if (mensajeDiv) {
      mensajeDiv.className = tipo;
      mensajeDiv.textContent = mensaje;
      setTimeout(() => {
        mensajeDiv.textContent = '';
        mensajeDiv.className = '';
      }, 3000);
    }
  }

  configurarEventos() {
    const form = document.getElementById('habitacionForm');
    if (form) {
      form.addEventListener('submit', (e) => this.guardarHabitacion(e));
    }
  }

  async guardarHabitacion(e) {
    e.preventDefault();
    const id = document.getElementById('habitacionId').value;
    const datos = {
      NombreHabitacion: document.getElementById('nombre').value,
      Descripcion: document.getElementById('descripcion').value,
      Costo: parseFloat(document.getElementById('precio').value),
      Estado: document.getElementById('estado').value === 'disponible' ? 1 : 0
    };

    try {
      const url = id ? `${this.baseURL}/habitacion/${id}` : `${this.baseURL}/habitacion`;
      const method = id ? 'PUT' : 'POST';
      
      const response = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(datos)
      });

      if (!response.ok) throw new Error('Error al guardar habitación');

      this.mostrarMensaje(id ? 'Habitación actualizada' : 'Habitación creada', 'success');
      document.getElementById('habitacionForm').reset();
      document.getElementById('habitacionId').value = '';
      this.cargarHabitaciones();
    } catch (error) {
      console.error('Error al guardar habitación:', error);
      this.mostrarMensaje('Error al guardar: ' + error.message, 'error');
    }
  }
  async obtenerHabitacion(id) {
    try {
      const response = await fetch(`${this.baseURL}/habitacion/${id}`);
      if (!response.ok) throw new Error('Habitación no encontrada');
      return await response.json();
    } catch (error) {
      this.mostrarMensaje('Error al obtener habitación: ' + error.message, 'error');
      return null;
    }
  }

  async eliminarHabitacion(id) {
    try {
      const response = await fetch(`${this.baseURL}/habitacion/${id}`, { method: 'DELETE' });
      if (!response.ok) throw new Error(`Error ${response.status}`);
      this.mostrarMensaje('Habitación eliminada exitosamente', 'success');
      this.cargarHabitaciones();
    } catch (error) {
      this.mostrarMensaje('Error al eliminar habitación: ' + error.message, 'error');
    }
  }
}

// Funciones globales
async function editarHabitacion(id) {
  if (window.habitacionesApi) {
    const hab = await window.habitacionesApi.obtenerHabitacion(id);
    if (hab) {
      document.getElementById('habitacionId').value = hab.IDHabitacion;
      document.getElementById('nombre').value = hab.NombreHabitacion;
      document.getElementById('descripcion').value = hab.Descripcion || '';
      document.getElementById('precio').value = hab.Costo;
      document.getElementById('estado').value = hab.Estado === 1 ? 'disponible' : 'no_disponible';
      
      document.getElementById('formTitle').textContent = `Editar Habitación #${hab.IDHabitacion}`;
      window.scrollTo(0, 0);
    }
  }
}

function eliminarHabitacion(id) {
  if (confirm('¿Está seguro de eliminar esta habitación?')) {
    if (window.habitacionesApi) {
      window.habitacionesApi.eliminarHabitacion(id);
    }
  }
}

// Función de inicialización
function inicializarHabitacionesAPI() {
  if (!window.habitacionesApi) {
    window.habitacionesApi = new HabitacionesAPI();
    window.habitacionesApi.inicializar();
}
}

window.inicializarHabitacionesAPI = inicializarHabitacionesAPI;
window.editarHabitacion = editarHabitacion;
window.eliminarHabitacion = eliminarHabitacion;
</script>
