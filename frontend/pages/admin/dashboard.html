<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin | Via Luna</title>
  <link rel="stylesheet" href="../../css/admin-theme.css">
  <script type="module">
    import { protectPage } from "../../js/core/authGuard.js";
    protectPage({ requiredRole: "admin" });
  </script>
</head>

<body>
  <div class="mobile-topbar">
    <button class="secondary menu-toggle" id="menuToggle" type="button" aria-expanded="false"
      aria-controls="backendSidebar">
      <span></span><span></span><span></span>
    </button>
    <strong>Dashboard Admin</strong>
  </div>
  <div class="layout">
    <aside class="sidebar" id="backendSidebar">
      <div class="brand">
        <h1>Via Luna</h1>
        <p>Panel de control administrativo del hospedaje.</p>
      </div>

      <nav class="admin-nav" aria-label="Modulos del sistema">
        <button class="admin-link icon-dashboard active" onclick="cargarVista('dashboard')"
          data-vista="dashboard">Dashboard</button>
        <button class="admin-link icon-reservation" onclick="cargarVista('reservas')"
          data-vista="reservas">Reservas</button>
        <button class="admin-link icon-room" onclick="cargarVista('habitaciones')"
          data-vista="habitaciones">Habitaciones</button>
        <button class="admin-link icon-package" onclick="cargarVista('paquetes')"
          data-vista="paquetes">Paquetes</button>
        <button class="admin-link icon-service" onclick="cargarVista('servicios')"
          data-vista="servicios">Servicios</button>
        <button class="admin-link icon-user" onclick="cargarVista('clientes')" data-vista="clientes">Clientes</button>
        <button class="admin-link icon-user" onclick="cargarVista('usuarios')" data-vista="usuarios">Usuarios</button>
        <button class="admin-link icon-user" onclick="cargarVista('roles-permisos')" data-vista="roles-permisos">Roles y
          Permisos</button>
      </nav>

      <div class="sidebar-actions">
        <button class="primary icon-new" type="button">Acceso rápido</button>
        <button class="secondary icon-reload" type="button" id="btnRecargar">Recargar sistema</button>
        <button class="ghost icon-clear" type="button" id="btnLimpiar">Limpiar caché</button>
      </div>

      <div class="sidebar-stats">
        <div class="stat-card">
          <span>Módulos activos</span>
          <strong>5</strong>
        </div>
        <div class="stat-card">
          <span>Estado del sistema</span>
          <strong>Online</strong>
        </div>
        <div class="stat-card">
          <span>Última actualización</span>
          <strong id="lastUpdate">Hoy</strong>
        </div>
      </div>

      <div class="auth-card">
        <h3>Acceso rápido</h3>
        <p>Navegación rápida a las páginas públicas de autenticación.</p>
        <div class="auth-links">
          <a class="secondary icon-register" href="../registro.html">Crear cuenta</a>
          <a class="primary icon-login" href="../login.html">Iniciar sesión</a>
          <a class="ghost icon-delete-account" href="../eliminar-cuenta.html">Eliminar cuenta</a>
          <button class="primary"
            style="margin-top: 10px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 8px;"
            onclick="cerrarSesion()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            Cerrar sesión
          </button>
        </div>
      </div>
    </aside>

    <main class="content">
      <div id="contenido">
        <!-- Contenido dinámico se cargará aquí -->
      </div>
    </main>
  </div>

  <script src="../../js/core/admin-layout.js"></script>
  <script>
    // Contenido del dashboard profesional
    function cargarContenidoDashboard() {
      const contenedor = document.getElementById('contenido');
      contenedor.innerHTML = `
        <section class="hero">
          <div>
            <h2>Dashboard Profesional</h2>
            <p>Panel de control administrativo con estadísticas en tiempo real</p>
          </div>
          <div class="badge">API Conectada</div>
        </section>

        <section class="dashboard-stats">
          <div class="stat-card">
            <div class="stat-icon">📊</div>
            <div class="stat-content">
              <h3>Total Reservas</h3>
              <span class="stat-number" id="totalReservas">0</span>
              <small>Reservas activas</small>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">👥</div>
            <div class="stat-content">
              <h3>Total Clientes</h3>
              <span class="stat-number" id="totalClientes">0</span>
              <small>Clientes registrados</small>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">👤</div>
            <div class="stat-content">
              <h3>Total Usuarios</h3>
              <span class="stat-number" id="totalUsuarios">0</span>
              <small>Usuarios del sistema</small>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">🏠</div>
            <div class="stat-content">
              <h3>Habitaciones Disponibles</h3>
              <span class="stat-number" id="habitacionesDisponibles">0</span>
              <small>Habitaciones libres</small>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h3>Reservas Recientes</h3>
            <p>Últimas 5 reservas del sistema</p>
          </div>
          <div class="table-container">
            <table id="tablaReservasRecientes">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Cliente</th>
                  <th>Habitación</th>
                  <th>Fecha Inicio</th>
                  <th>Fecha Fin</th>
                  <th>Estado</th>
                </tr>
              </thead>
              <tbody id="cuerpoTablaRecientes">
                <tr><td colspan="6" class="loading">Cargando reservas...</td></tr>
              </tbody>
            </table>
          </div>
          <div class="panel-actions">
            <button class="primary" onclick="actualizarDashboard()">Actualizar Datos</button>
            <button class="secondary" onclick="limpiarCache()">Limpiar Cache</button>
          </div>
        </section>
      `;
    }

    // Función para ejecutar scripts específicos de cada vista
    function ejecutarScriptsDeVista(vista) {
      const scripts = {
        dashboard: () => {
          console.log('Inicializando dashboard profesional...');
          setTimeout(() => {
            if (window.inicializarDashboardAPI) {
              window.inicializarDashboardAPI();
            }
          }, 500);
        },
        reservas: () => {
          console.log('Inicializando CRUD de Reservas con API...');
          setTimeout(() => {
            if (window.inicializarReservasAPI) {
              window.inicializarReservasAPI();
            }
          }, 500);
        },
        clientes: () => {
          console.log('Inicializando CRUD de Clientes con API...');
          setTimeout(() => {
            if (window.inicializarClientesAPI) {
              window.inicializarClientesAPI();
            }
          }, 500);
        },
        'roles-permisos': () => {
          console.log('Inicializando Roles y Permisos con API...');
          setTimeout(() => {
            if (window.inicializarRolesPermisosAPI) {
              window.inicializarRolesPermisosAPI();
            }
          }, 500);
        },
        habitaciones: () => {
          console.log('Inicializando CRUD de Habitaciones...');
          setTimeout(() => {
            if (window.inicializarHabitacionesAPI) {
              window.inicializarHabitacionesAPI();
            }
          }, 500);
        },
        paquetes: () => {
          console.log('Inicializando CRUD de Paquetes...');
          setTimeout(() => {
            if (window.inicializarPaquetesAPI) {
              window.inicializarPaquetesAPI();
            }
          }, 500);
        },
        servicios: () => {
          console.log('Inicializando CRUD de Servicios...');
          setTimeout(() => {
            if (window.inicializarServiciosAPI) {
              window.inicializarServiciosAPI();
            }
          }, 500);
        },
        usuarios: () => {
          console.log('Inicializando CRUD de Usuarios...');
          setTimeout(() => {
            if (window.inicializarUsuariosAPI) {
              window.inicializarUsuariosAPI();
            }
          }, 500);
        }
      };

      if (scripts[vista]) {
        scripts[vista]();
      }
    }

    // FUNCIÓN PARA CARGAR VISTAS EXTERNAS
    async function cargarVistaExterna(vista) {
      try {
        const response = await fetch(`../${vista}.html`);
        if (!response.ok) {
          throw new Error(`No se pudo cargar ${vista}.html: ${response.status}`);
        }

        let html = await response.text();

        // Corregir rutas relativas para que funcionen dentro del dashboard
        html = html.replace(/href="\.\.\/css\//g, 'href="../../css/');
        html = html.replace(/src="\.\.\/js\//g, 'src="../../js/');

        // Insertar el contenido completo en el dashboard
        const contenedor = document.getElementById('contenido');
        contenedor.innerHTML = html;

        // Extraer y ejecutar scripts inline del HTML insertado (evitar duplicados)
        const scripts = contenedor.querySelectorAll('script');
        scripts.forEach(script => {
          script.remove(); // Remover del contenedor para evitar ejecución duplicada
          const scriptId = `script-${vista}`;
          // Eliminar script previo si existe
          const existingScript = document.getElementById(scriptId);
          if (existingScript) {
            existingScript.remove();
          }
          // Crear y agregar nuevo script envuelto en IIFE para evitar redeclaraciones
          const newScript = document.createElement('script');
          newScript.textContent = `(function(){ ${script.textContent} })();`;
          newScript.id = scriptId;
          document.body.appendChild(newScript);
        });

        // Ejecutar scripts específicos de la vista
        ejecutarScriptsDeVista(vista);

      } catch (error) {
        console.error(`Error cargando vista ${vista}:`, error);
        const contenedor = document.getElementById('contenido');
        contenedor.innerHTML = `
          <div class="error">
            <h3>Error al cargar la vista</h3>
            <p>No se pudo cargar "${vista}.html"</p>
            <p><strong>Detalles:</strong> ${error.message}</p>
            <button class="primary" onclick="cargarVista('dashboard')">Volver al Dashboard</button>
          </div>
        `;
      }
    }

    // FUNCIÓN PRINCIPAL DE CARGA DE VISTAS
    async function cargarVista(vista) {
      try {
        // Actualizar estado activo en el sidebar
        actualizarVistaActiva(vista);

        if (vista === 'dashboard') {
          // El dashboard es el contenido inline, no hay archivo externo
          cargarContenidoDashboard();
          ejecutarScriptsDeVista('dashboard');
          return;
        }

        // Cargar vista externa
        await cargarVistaExterna(vista);

      } catch (error) {
        console.error('Error al cargar vista:', error);
      }
    }

    // Función para actualizar el estado activo en el sidebar
    function actualizarVistaActiva(vistaActiva) {
      // Remover clase 'active' de todos los botones
      const botones = document.querySelectorAll('.admin-link');
      botones.forEach(boton => {
        boton.classList.remove('active');
      });

      // Agregar clase 'active' al botón de la vista actual
      const botonActivo = document.querySelector(`[data-vista="${vistaActiva}"]`);
      if (botonActivo) {
        botonActivo.classList.add('active');
      }
    }

    // Funciones globales para el dashboard
    function actualizarDashboard() {
      console.log('Actualizando dashboard...');
      if (window.inicializarDashboardAPI) {
        window.inicializarDashboardAPI();
      }
    }

    function limpiarCache() {
      console.log('Limpiando cache...');
      localStorage.clear();
      sessionStorage.clear();
      alert('Cache limpiada correctamente');
    }

    // Exponer funciones globalmente
    window.actualizarDashboard = actualizarDashboard;
    window.limpiarCache = limpiarCache;

    // API REST CONEXIÓN PARA DASHBOARD
    class DashboardAPI {
      constructor() {
        this.baseURL = 'http://localhost:3000/api';
      }

      async cargarEstadisticas() {
        try {
          const reservasResponse = await fetch(`${this.baseURL}/reservas`);
          if (reservasResponse.ok) {
            const reservas = await reservasResponse.json();
            document.getElementById('totalReservas').textContent = reservas.length;
          }

          const clientesResponse = await fetch(`${this.baseURL}/clientes`);
          if (clientesResponse.ok) {
            const clientes = await clientesResponse.json();
            document.getElementById('totalClientes').textContent = clientes.length;
          }

          const usuariosResponse = await fetch(`${this.baseURL}/usuarios`);
          if (usuariosResponse.ok) {
            const usuarios = await usuariosResponse.json();
            document.getElementById('totalUsuarios').textContent = usuarios.length;
          }

          const habitacionesResponse = await fetch(`${this.baseURL}/habitacion`);
          if (habitacionesResponse.ok) {
            const habitaciones = await habitacionesResponse.json();
            const disponibles = habitaciones.filter(h => h.estado === 'disponible' || !h.estado).length;
            document.getElementById('habitacionesDisponibles').textContent = disponibles;
          }
        } catch (error) {
          console.error('Error al cargar estadísticas:', error);
        }
      }

      async cargarReservasRecientes() {
        try {
          const tbody = document.getElementById('cuerpoTablaRecientes');
          if (!tbody) return;

          tbody.innerHTML = '<tr><td colspan="6" class="loading">Cargando reservas recientes...</td></tr>';

          const response = await fetch(`${this.baseURL}/reservas`);
          if (!response.ok) {
            throw new Error(`Error ${response.status}: No se pudieron cargar las reservas`);
          }

          const reservas = await response.json();
          this.mostrarReservasRecientes(reservas.slice(0, 5));
        } catch (error) {
          console.error('Error al cargar reservas recientes:', error);
          const tbody = document.getElementById('cuerpoTablaRecientes');
          if (tbody) {
            tbody.innerHTML = `<tr><td colspan="6" class="error">Error: ${error.message}</td></tr>`;

          }
        }
      }

      getReservasEjemplo() {
        return [
          {
            id_reserva: 1,
            cliente_nombre: 'Juan Pérez',
            habitacion: 'Habitación 101',
            fecha_inicio: '2026-05-01',
            fecha_fin: '2026-05-05'
          },
          {
            id_reserva: 2,
            cliente_nombre: 'María García',
            habitacion: 'Habitación 201',
            fecha_inicio: '2026-05-10',
            fecha_fin: '2026-05-15'
          },
          {
            id_reserva: 3,
            cliente_nombre: 'Carlos Rodríguez',
            habitacion: 'Suite 301',
            fecha_inicio: '2026-05-20',
            fecha_fin: '2026-05-25'
          }
        ];
      }

      mostrarReservasRecientes(reservas) {
        const tbody = document.getElementById('cuerpoTablaRecientes');

        if (reservas.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="loading">No hay reservas recientes</td></tr>';
          return;
        }

        tbody.innerHTML = reservas.map(reserva => `
          <tr>
            <td>#${reserva.id_reserva || reserva.id}</td>
            <td>${reserva.cliente_nombre || 'Cliente ' + reserva.id_cliente}</td>
            <td>${reserva.habitacion || 'Habitación ' + reserva.id_habitacion}</td>
            <td>${this.formatearFecha(reserva.fecha_inicio)}</td>
            <td>${this.formatearFecha(reserva.fecha_fin)}</td>
            <td><span class="status-badge status-activo">Activa</span></td>
          </tr>
        `).join('');
      }

      formatearFecha(fecha) {
        const date = new Date(fecha);
        return date.toLocaleDateString('es-CO', {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit'
        });
      }

      inicializar() {
        this.cargarEstadisticas();
        this.cargarReservasRecientes();
      }
    }

    // Función de inicialización para el dashboard
    function inicializarDashboardAPI() {
      if (!window.dashboardApi) {
        window.dashboardApi = new DashboardAPI();
      } else {
        window.dashboardApi.inicializar();
      }
    }

    window.inicializarDashboardAPI = inicializarDashboardAPI;

    // Hacer funciones globales para acceso desde HTML dinámico
    window.cargarVista = cargarVista;
    window.actualizarVistaActiva = actualizarVistaActiva;

    // Cargar dashboard por defecto al iniciar
    document.addEventListener('DOMContentLoaded', () => {
      cargarVista('dashboard');
    });

    // Función para cerrar sesión
    function cerrarSesion() {
      if (confirm('¿Estás seguro de que deseas cerrar sesión?')) {
        // Limpiar todo el almacenamiento local
        localStorage.clear();
        sessionStorage.clear();
        // Redirigir al login
        window.location.href = '../login.html';
      }
    }
    window.cerrarSesion = cerrarSesion;
  </script>
</body>

</html>
